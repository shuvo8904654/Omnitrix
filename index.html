<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./features/features.css">
    <link rel="icon" type="image/png" href="./assets/favicon/favicon.png">
    <title>Ben 10 Omniverse Omnitrix</title>
</head>

<body>


    <div class="particles-container" id="particles-container"></div>

    <div class="holo-ring-container">
        <div class="holo-ring" id="holo-ring">

        </div>
    </div>

    <div class="omnitrix">

        <div class="strap"></div>


        <div class="green-shell-border"></div>


        <div class="green-shell">


            <div class="groove-container left-grooves">
                <div class="groove"></div>
                <div class="groove"></div>
                <div class="groove"></div>
            </div>


            <div class="groove-container right-grooves">
                <div class="groove"></div>
                <div class="groove"></div>
                <div class="groove"></div>
            </div>


            <div class="white-center">


                <div class="bezel-border"></div>
                <div class="bezel">


                    <div class="screen" id="anel">

                        <div class="scan-line" id="scan-line"></div>


                        <div class="cooldown-bar-container" id="cooldown-bar-container">
                            <div class="cooldown-bar" id="cooldown-bar"></div>
                        </div>


                        <img id="alien-display-prev" class="alien-display-prev" alt="">

                        <img id="alien-display" class="alien-display" alt="">


                        <div class="chevron left-chevron"></div>
                        <div class="chevron right-chevron"></div>
                    </div>

                </div>
            </div>
        </div>


        <div class="light-burst" id="light-burst"></div>

        <div class="light-rays" id="light-rays"></div>


        <div class="btn-left" id="btn-left">
            <span class="btn-arrow">&#9664;</span>
        </div>
        <div class="btn-right" id="btn-right">
            <span class="btn-arrow">&#9654;</span>
        </div>
    </div>


    <div class="transform-timer" id="transform-timer">
        <span class="transform-timer-label" id="transform-timer-label"></span>
        <div class="transform-timer-fill" id="transform-timer-fill"></div>
    </div>


    <div class="ui-controls">
        <button class="ui-btn" id="sound-toggle" title="Toggle Sound">
            <span id="sound-icon">&#9834;</span>
        </button>
        <button class="ui-btn" id="random-btn" title="Random Alien">?</button>
        <button class="ui-btn" id="theme-toggle" title="Toggle Ben/Albedo Theme">
            <span id="theme-icon">B</span>
        </button>
        <button class="ui-btn" id="fav-btn" title="Toggle Favorite">
            <span id="fav-icon">&#9734;</span>
        </button>
        <button class="ui-btn" id="playlist-btn" title="Playlists">
            <span id="pl-icon">&#9776;</span>
        </button>
    </div>


    <div class="alien-info-panel" id="alien-info-panel">
        <button class="info-close" id="info-close">X</button>
        <img class="info-alien-img" id="info-alien-img" alt="">
        <h2 class="info-alien-name" id="info-alien-name"></h2>
        <p class="info-alien-desc" id="info-alien-desc"></p>
        <div class="info-fav-indicator" id="info-fav-indicator"></div>
    </div>


    <div class="playlist-panel" id="playlist-panel">
        <button class="info-close" id="playlist-close">X</button>
        <h3>Playlists</h3>
        <div class="playlist-list" id="playlist-list"></div>
        <div class="playlist-actions">
            <button id="playlist-create">Save Current</button>
            <button id="playlist-create-fav">From Favorites</button>
        </div>
    </div>

    <script src="./scripts.js"></script>


    <script src="./features/effects.js"></script>
    <script src="./features/cooldown.js"></script>
    <script src="./features/audio-features.js"></script>
    <script src="./features/playlist.js"></script>
    <script src="./features/mastercontrol.js"></script>
    <script src="./features/ui-extras.js"></script>

</body>

</html>
